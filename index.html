<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio V13.5</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Portfolio">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input, select {
            background: transparent;
            border-bottom: 1px solid #333;
            border-radius: 0;
            color: white;
            transition: all 0.2s ease;
            appearance: none;
        }
        input:focus, select:focus {
            outline: none;
            border-bottom-color: #fff;
            background: transparent;
        }
        input[type="date"] { color-scheme: dark; }
        
        /* Animationen */
        .spin-slow { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

        .modal-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
        .view-section { display: none; height: 100%; flex-direction: column; }
        .view-section.active { display: flex; }
    </style>
</head>
<body class="h-screen overflow-hidden bg-black text-white">

    <div id="viewDashboard" class="view-section active px-5 pt-12 pb-8">
        <div class="flex justify-between items-center mb-8 shrink-0">
            <button onclick="togglePrivacy()" class="p-2 -ml-2 text-gray-500 hover:text-white transition-colors">
                <i id="iconPrivacy" class="ph ph-eye-slash text-2xl"></i>
            </button>
            <div class="flex gap-4">
                <button onclick="fetchAllPrices()" class="p-2 text-gray-500 hover:text-white transition-colors">
                    <i id="iconRefresh" class="ph ph-arrows-clockwise text-2xl"></i>
                </button>
                <button onclick="openSettings()" class="p-2 text-gray-500 hover:text-white transition-colors">
                    <i class="ph ph-gear text-2xl"></i>
                </button>
            </div>
        </div>

        <div class="mb-8 text-center shrink-0">
            <p class="text-gray-500 text-xs font-medium uppercase tracking-widest mb-2">Gesamtwert</p>
            <h1 id="currentValueDisplay" class="text-4xl font-light tracking-tight text-white mb-3">•••• €</h1>
            
            <div class="inline-flex items-center justify-center gap-2 px-3 py-1 rounded-full bg-[#111] border border-[#222]">
                <span id="plPercent" class="text-xs font-medium text-gray-400">0.00%</span>
                <span class="text-[10px] text-gray-600">|</span>
                <span id="plDisplay" class="text-xs text-gray-400">•••• €</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-4 shrink-0">
            <div onclick="switchView('history', 'gold')" class="bg-[#111] border border-[#222] rounded-lg p-3 text-center cursor-pointer active:bg-[#1a1a1a]">
                <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Gold</p>
                <p id="goldVal" class="text-sm font-medium text-white mb-0.5">•••• €</p>
                <p id="goldPL" class="text-[9px] text-gray-600">0.0%</p>
            </div>
            <div onclick="switchView('history', 'silver')" class="bg-[#111] border border-[#222] rounded-lg p-3 text-center cursor-pointer active:bg-[#1a1a1a]">
                <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Silber</p>
                <p id="silverVal" class="text-sm font-medium text-white mb-0.5">•••• €</p>
                <p id="silverPL" class="text-[9px] text-gray-600">0.0%</p>
            </div>
            <div onclick="switchView('history', 'etf')" class="bg-[#111] border border-[#222] rounded-lg p-3 text-center cursor-pointer active:bg-[#1a1a1a]">
                <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">ETF</p>
                <p id="etfVal" class="text-sm font-medium text-white mb-0.5">•••• €</p>
                <p id="etfPL" class="text-[9px] text-gray-600">0.0%</p>
            </div>
        </div>

        <div class="bg-[#0a0a0a] border border-[#1a1a1a] rounded-lg py-2 px-4 mb-8 shrink-0">
            <div class="flex justify-around items-center">
                <div class="text-center">
                    <p class="text-[8px] text-gray-600 uppercase font-bold">Gold (g)</p>
                    <p id="marketGold" class="text-[11px] text-gray-300 font-mono pulse">Lade...</p>
                </div>
                <div class="h-4 w-[1px] bg-[#222]"></div>
                <div class="text-center">
                    <p class="text-[8px] text-gray-600 uppercase font-bold">Silber (g)</p>
                    <p id="marketSilver" class="text-[11px] text-gray-300 font-mono pulse">Lade...</p>
                </div>
                <div class="h-4 w-[1px] bg-[#222]"></div>
                <div class="text-center">
                    <p class="text-[8px] text-gray-600 uppercase font-bold">MSCI World</p>
                    <p id="marketETF" class="text-[11px] text-gray-300 font-mono pulse">Lade...</p>
                </div>
            </div>
        </div>

        <div class="flex-1"></div>

        <div class="space-y-3 shrink-0">
            <button onclick="openModal()" class="w-full h-12 bg-white text-black rounded-lg text-xs font-bold uppercase tracking-widest active:bg-gray-200 transition-colors">
                Neuer Eintrag
            </button>
            <button onclick="switchView('history', 'all')" class="w-full h-12 bg-transparent border border-[#333] text-gray-400 rounded-lg text-xs font-bold uppercase tracking-widest active:border-white active:text-white transition-colors">
                Gesamte Historie
            </button>
        </div>
        
        <div class="mt-4 text-center pb-safe">
             <span id="statusLabel" class="text-[9px] text-gray-700 font-mono uppercase tracking-widest">Initialisierung...</span>
        </div>
    </div>

    <div id="viewHistory" class="view-section px-5 pt-12 pb-8 bg-black">
        <div class="flex items-center justify-between mb-6 shrink-0">
            <span id="historyTitle" class="text-sm font-bold uppercase tracking-widest text-gray-500">Historie</span>
            <div class="flex gap-4">
                <button onclick="togglePrivacy()" class="text-gray-500 hover:text-white transition-colors">
                    <i id="iconPrivacyHistory" class="ph ph-eye-slash text-xl"></i>
                </button>
                <button onclick="switchView('dashboard')" class="text-white">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-hidden flex flex-col">
            <div id="historyList" class="overflow-y-auto no-scrollbar pb-10 space-y-4"></div>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-6">
        <div class="bg-[#111] border border-[#333] w-full max-w-xs rounded-xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-white font-medium text-sm uppercase tracking-widest">Einstellungen</h3>
                <button onclick="closeSettings()" class="text-gray-500"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div class="space-y-3">
                <button onclick="exportBackup()" class="w-full py-3 bg-[#1c1c1e] border border-[#333] rounded text-xs text-gray-300 flex items-center justify-center gap-2">
                    <i class="ph ph-download-simple"></i> Backup Speichern
                </button>
                <button onclick="document.getElementById('importFile').click()" class="w-full py-3 bg-[#1c1c1e] border border-[#333] rounded text-xs text-gray-300 flex items-center justify-center gap-2">
                    <i class="ph ph-upload-simple"></i> Backup Laden
                </button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(this)">
            </div>
        </div>
    </div>

    <div id="entryModal" class="fixed inset-0 modal-overlay z-50 hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-[#111] border border-[#333] w-full max-w-sm rounded-xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modalTitle" class="text-white font-medium text-sm uppercase tracking-widest">Eintrag</h3>
                <button onclick="closeModal()" class="text-gray-500"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div class="space-y-6">
                <div class="flex gap-4">
                    <div class="w-1/3">
                        <label class="text-[9px] text-gray-500 uppercase mb-1 block">Typ</label>
                        <select id="inpCat" onchange="updateModalLabels()" class="w-full py-2 text-sm">
                            <option value="gold">Gold</option>
                            <option value="silver">Silber</option>
                            <option value="etf">ETF</option>
                        </select>
                    </div>
                    <div class="w-2/3">
                        <label class="text-[9px] text-gray-500 uppercase mb-1 block">Produkt</label>
                        <input type="text" id="inpProd" class="w-full py-2 text-sm">
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-[9px] text-gray-500 uppercase mb-1 block">Preis (€)</label>
                        <input type="number" id="inpAmt" step="0.01" inputmode="decimal" class="w-full py-2 text-lg">
                    </div>
                    <div class="w-1/2">
                        <label id="lblWeight" class="text-[9px] text-gray-500 uppercase mb-1 block">Gewicht / Stk</label>
                        <input type="number" id="inpWgt" step="0.0001" inputmode="decimal" class="w-full py-2 text-lg">
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-[9px] text-gray-500 uppercase mb-1 block">Ort</label>
                        <input type="text" id="inpLoc" class="w-full py-2 text-sm">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[9px] text-gray-500 uppercase mb-1 block">Datum</label>
                        <input type="date" id="inpDate" class="w-full py-2 text-xs">
                    </div>
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button id="btnDelete" onclick="deleteCurrentEntry()" class="hidden w-1/3 h-10 border border-red-900 text-red-700 text-xs font-bold uppercase rounded">Löschen</button>
                <button onclick="saveEntry()" class="flex-1 h-10 bg-white text-black text-xs font-bold uppercase rounded">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        let entries = JSON.parse(localStorage.getItem('portfolio_entries_v12')) || [];
        let prices = { gold: 0, silver: 0, etf: 0, lastUpdate: '--:--' };
        let isPrivacyMode = true; // STARTET IMMER IM PRIVACY MODUS
        let currentEditId = null;
        let currentFilter = 'all';

        const els = {
            totalVal: document.getElementById('currentValueDisplay'),
            plDisplay: document.getElementById('plDisplay'),
            plPercent: document.getElementById('plPercent'),
            status: document.getElementById('statusLabel'),
            list: document.getElementById('historyList'),
            goldVal: document.getElementById('goldVal'), goldPL: document.getElementById('goldPL'),
            silverVal: document.getElementById('silverVal'), silverPL: document.getElementById('silverPL'),
            etfVal: document.getElementById('etfVal'), etfPL: document.getElementById('etfPL'),
            iconPrivacy: document.getElementById('iconPrivacy'),
            iconPrivacyHistory: document.getElementById('iconPrivacyHistory'),
            modal: document.getElementById('entryModal'),
            settingsModal: document.getElementById('settingsModal'),
            inpCat: document.getElementById('inpCat'), inpProd: document.getElementById('inpProd'),
            inpAmt: document.getElementById('inpAmt'), inpWgt: document.getElementById('inpWgt'),
            inpLoc: document.getElementById('inpLoc'), inpDate: document.getElementById('inpDate'),
            btnDelete: document.getElementById('btnDelete'), lblWeight: document.getElementById('lblWeight'),
            historyTitle: document.getElementById('historyTitle'),
            mGold: document.getElementById('marketGold'),
            mSilver: document.getElementById('marketSilver'),
            mETF: document.getElementById('marketETF')
        };

        // KURSABRUF MIT STATUS-ANZEIGE
        async function fetchAllPrices() {
            const icon = document.getElementById('iconRefresh');
            if(icon) icon.classList.add('ph-spinner', 'spin-slow');
            
            els.mGold.classList.add('pulse'); els.mSilver.classList.add('pulse'); els.mETF.classList.add('pulse');

            // --- 1. Gold & Silber über neue Quelle (Gold.de / Edelmetalle API) ---
            els.status.innerText = "Lade Edelmetall-Kurse...";
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.edelmetalle.de/public.json')}&ts=${Date.now()}`;
                const res = await fetch(proxyUrl);
                const data = await res.json();
                const json = JSON.parse(data.contents);
                
                if(json.gold) {
                    prices.gold = json.gold.eur_g;
                    els.mGold.innerText = prices.gold.toFixed(2) + " €";
                    els.mGold.classList.remove('pulse');
                }
                if(json.silber) {
                    prices.silver = json.silber.eur_g;
                    els.mSilver.innerText = prices.silver.toFixed(2) + " €";
                    els.mSilver.classList.remove('pulse');
                }
            } catch (e) {
                console.error("Fehler Gold.de API", e);
                els.status.innerText = "Edelmetall-Fehler. Versuche Yahoo...";
                // Fallback zu Yahoo Finance
                await fetchPreciousYahoo();
            }

            // --- 2. ETF über Yahoo Finance ---
            els.status.innerText = "Lade MSCI World...";
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/EUNL.DE?interval=1d&range=1d`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&ts=${Date.now()}`;
                const res = await fetch(proxyUrl);
                const data = await res.json();
                const json = JSON.parse(data.contents);
                const etfPrice = json.chart.result[0].meta.regularMarketPrice;
                
                if(etfPrice) {
                    prices.etf = etfPrice;
                    els.mETF.innerText = etfPrice.toFixed(2) + " €";
                    els.mETF.classList.remove('pulse');
                }
            } catch (e) {
                els.mETF.innerText = "Error";
                els.mETF.classList.remove('pulse');
            }

            prices.lastUpdate = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
            els.status.innerText = "Update: " + prices.lastUpdate;
            
            render();
            if(icon) icon.classList.remove('ph-spinner', 'spin-slow');
        }

        async function fetchPreciousYahoo() {
            const fetchTicker = async (ticker) => {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&ts=${Date.now()}`);
                const data = await res.json();
                return JSON.parse(data.contents).chart.result[0].meta.regularMarketPrice;
            };
            try {
                const g = await fetchTicker('XAUEUR=X');
                if(g) { prices.gold = g / 31.1034768; els.mGold.innerText = prices.gold.toFixed(2) + " €"; els.mGold.classList.remove('pulse'); }
                const s = await fetchTicker('XAGEUR=X');
                if(s) { prices.silver = s / 31.1034768; els.mSilver.innerText = prices.silver.toFixed(2) + " €"; els.mSilver.classList.remove('pulse'); }
            } catch(e) {}
        }

        // BERECHNUNG & ANZEIGE
        function render() {
            let tInv=0, tVal=0, gInv=0, gVal=0, sInv=0, sVal=0, eInv=0, eVal=0;

            entries.forEach(e => {
                const inv = parseFloat(e.amount) || 0;
                tInv += inv;
                let p = (e.category === 'gold') ? prices.gold : (e.category === 'silver' ? prices.silver : prices.etf);
                let val = (p > 0) ? (parseFloat(e.weight) || 0) * p : inv;
                
                if(e.category === 'gold') { gVal += val; gInv += inv; }
                else if(e.category === 'silver') { sVal += val; sInv += inv; }
                else if(e.category === 'etf') { eVal += val; eInv += inv; }
                tVal += val;
            });

            els.totalVal.innerText = fmt(tVal);
            const diff = tVal - tInv;
            const pct = tInv > 0 ? (diff/tInv)*100 : 0;
            
            els.plDisplay.innerText = fmt(diff, true);
            els.plPercent.innerText = (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
            const col = diff >= 0 ? "text-green-500" : "text-red-500";
            els.plDisplay.className = "text-xs " + col;
            els.plPercent.className = "text-xs font-bold " + col;

            updateCard(els.goldVal, els.goldPL, gVal, gInv);
            updateCard(els.silverVal, els.silverPL, sVal, sInv);
            updateCard(els.etfVal, els.etfPL, eVal, eInv);
        }

        function renderList() {
            els.list.innerHTML = '';
            const filtered = currentFilter === 'all' ? entries : entries.filter(e => e.category === currentFilter);
            
            filtered.forEach(e => {
                let p = (e.category === 'gold') ? prices.gold : (e.category === 'silver' ? prices.silver : prices.etf);
                const val = (p > 0) ? (e.weight * p) : e.amount;
                const plP = e.amount > 0 ? ((val - e.amount)/e.amount*100) : 0;
                
                const el = document.createElement('div');
                el.onclick = () => openModal(e.id);
                el.className = 'border-b border-[#222] pb-3 last:border-0 active:opacity-50 cursor-pointer';
                el.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-white text-sm font-medium">${e.product}</span>
                        <span class="text-white text-sm font-light">${fmt(val)}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-[10px] text-gray-500 uppercase">${e.category} • ${new Date(e.date).toLocaleDateString('de-DE')}</div>
                        <div class="flex gap-2 text-[10px]">
                            <span class="text-gray-600">${fmt(e.amount)}</span>
                            <span class="${plP >= 0 ? 'text-green-500' : 'text-red-500'}">${plP >= 0 ? '+' : ''}${plP.toFixed(1)}%</span>
                        </div>
                    </div>
                `;
                els.list.appendChild(el);
            });
        }

        // NAVIGATION & MODALS
        function togglePrivacy() {
            isPrivacyMode = !isPrivacyMode;
            const icon = isPrivacyMode ? "ph ph-eye-slash" : "ph ph-eye";
            els.iconPrivacy.className = icon + " text-2xl";
            if(els.iconPrivacyHistory) els.iconPrivacyHistory.className = icon + " text-xl";
            render();
            if(document.getElementById('viewHistory').classList.contains('active')) renderList();
        }

        function fmt(n, showPlus = false) { 
            if(isPrivacyMode) return '•••• €';
            let formatted = new Intl.NumberFormat('de-DE', {style:'currency', currency:'EUR'}).format(n);
            return (showPlus && n >= 0) ? "+" + formatted : formatted;
        }

        function updateCard(v, p, c, i) { 
            v.innerText = fmt(c); 
            const d = c - i; 
            const pct = i > 0 ? (d/i*100) : 0;
            p.innerText = (d >= 0 ? "+" : "") + pct.toFixed(1) + "%"; 
            p.className = d >= 0 ? "text-[9px] text-green-500" : "text-[9px] text-red-500"; 
        }

        function switchView(view, filter = 'all') {
            currentFilter = filter;
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            if(view === 'history') {
                document.getElementById('viewHistory').classList.add('active');
                const titles = { all: 'Historie', gold: 'Gold', silver: 'Silber', etf: 'ETF' };
                els.historyTitle.innerText = titles[currentFilter];
                renderList();
            } else {
                document.getElementById('viewDashboard').classList.add('active');
                render();
            }
        }

        function openModal(id=null) { 
            currentEditId = id; 
            els.modal.classList.replace('hidden', 'flex');
            if(id) { 
                const e = entries.find(x => x.id === id); 
                els.inpCat.value = e.category; els.inpProd.value = e.product; els.inpAmt.value = e.amount; 
                els.inpWgt.value = e.weight; els.inpLoc.value = e.location || ''; els.inpDate.value = e.date;
                els.btnDelete.classList.remove('hidden');
            } else {
                els.inpCat.value = 'gold'; els.inpProd.value = ''; els.inpAmt.value = ''; 
                els.inpWgt.value = ''; els.inpLoc.value = ''; els.inpDate.value = new Date().toISOString().split('T')[0];
                els.btnDelete.classList.add('hidden');
            }
            updateModalLabels();
        }

        function saveEntry() {
            const item = { id: currentEditId || Date.now(), amount: parseFloat(els.inpAmt.value) || 0, weight: parseFloat(els.inpWgt.value) || 0, category: els.inpCat.value, product: els.inpProd.value || "Eintrag", location: els.inpLoc.value, date: els.inpDate.value };
            if(currentEditId) entries[entries.findIndex(x => x.id === currentEditId)] = item; else entries.unshift(item);
            entries.sort((a,b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('portfolio_entries_v12', JSON.stringify(entries));
            render(); renderList(); closeModal();
        }

        function deleteCurrentEntry() { if(confirm("Löschen?")) { entries = entries.filter(x => x.id !== currentEditId); localStorage.setItem('portfolio_entries_v12', JSON.stringify(entries)); render(); renderList(); closeModal(); } }
        function exportBackup() { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries)); a.download = "portfolio_backup.json"; a.click(); }
        function importBackup(inp) { const f = inp.files[0]; if(!f) return; const r = new FileReader(); r.onload = e => { entries = JSON.parse(e.target.result); localStorage.setItem('portfolio_entries_v12', JSON.stringify(entries)); location.reload(); }; r.readAsText(f); }
        function closeModal() { els.modal.classList.replace('flex', 'hidden'); }
        function openSettings() { els.settingsModal.classList.replace('hidden', 'flex'); }
        function closeSettings() { els.settingsModal.classList.replace('flex', 'hidden'); }
        function updateModalLabels() { if(els.inpCat.value==='etf') { if(!els.inpProd.value) els.inpProd.value="Core MSCI World USD (Acc)"; } }

        document.addEventListener("DOMContentLoaded", () => {
            render(); 
            fetchAllPrices();
        });
    </script>
</body>
</html>
