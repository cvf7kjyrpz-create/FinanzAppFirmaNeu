<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio V17</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Portfolio">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input, select {
            background: transparent;
            border-bottom: 1px solid #333;
            border-radius: 0;
            color: white;
            transition: all 0.2s ease;
            appearance: none;
        }
        input:focus, select:focus {
            outline: none;
            border-bottom-color: #fff;
            background: transparent;
        }
        input[type="date"] { color-scheme: dark; }
        
        .spin-slow { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .modal-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
        .view-section { display: none; height: 100%; flex-direction: column; }
        .view-section.active { display: flex; }
    </style>
</head>
<body class="h-screen overflow-hidden bg-black text-white">

    <div id="viewDashboard" class="view-section active px-5 pt-12 pb-8">
        
        <div class="flex justify-between items-center mb-8 shrink-0">
            <button onclick="togglePrivacy()" class="text-gray-500 hover:text-white transition-colors">
                <i id="iconPrivacy" class="ph ph-eye-slash text-2xl"></i>
            </button>
            <div class="flex gap-4">
                <button onclick="fetchAllPrices()" class="text-gray-500 hover:text-white transition-colors">
                    <i id="iconRefresh" class="ph ph-arrows-clockwise text-2xl"></i>
                </button>
                <button onclick="openSettings()" class="text-gray-500 hover:text-white transition-colors">
                    <i class="ph ph-gear text-2xl"></i>
                </button>
            </div>
        </div>

        <div class="mb-10 text-center shrink-0">
            <p class="text-gray-500 text-xs font-medium uppercase tracking-widest mb-2">Portfolio Wert</p>
            <h1 id="currentValueDisplay" class="text-4xl font-light tracking-tight text-white mb-3">•••• €</h1>
            
            <div class="inline-flex items-center justify-center gap-2 px-3 py-1 rounded-full bg-[#111] border border-[#222]">
                <span id="plPercent" class="text-xs font-medium text-gray-400">0%</span>
                <span class="text-[10px] text-gray-600">|</span>
                <span id="plDisplay" class="text-xs text-gray-400">0 €</span>
            </div>
            <div class="mt-3">
                 <span id="sinceDateLabel" class="text-[10px] text-gray-600 font-medium">Lade Daten...</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6 shrink-0">
            <div class="bg-[#111] border border-[#222] rounded-lg p-3 text-center">
                <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Gold</p>
                <p id="goldVal" class="text-sm font-medium text-white mb-0.5">•••• €</p>
                <p id="goldPL" class="text-[9px] text-gray-600">0%</p>
            </div>
            <div class="bg-[#111] border border-[#222] rounded-lg p-3 text-center">
                <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">Silber</p>
                <p id="silverVal" class="text-sm font-medium text-white mb-0.5">•••• €</p>
                <p id="silverPL" class="text-[9px] text-gray-600">0%</p>
            </div>
            <div class="bg-[#111] border border-[#222] rounded-lg p-3 text-center">
                <p class="text-[9px] text-gray-500 uppercase tracking-wider mb-1">ETF</p>
                <p id="etfVal" class="text-sm font-medium text-white mb-0.5">•••• €</p>
                <p id="etfPL" class="text-[9px] text-gray-600">0%</p>
            </div>
        </div>

        <div class="bg-[#111] border border-[#222] rounded-lg py-3 px-4 mb-8 shrink-0 flex justify-between items-center">
            <div class="text-center w-1/3">
                <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1 font-bold">Gold / g</p>
                <p id="marketGold" class="text-[11px] font-mono text-white">Lade...</p>
            </div>
            <div class="w-[1px] h-6 bg-[#333]"></div>
            <div class="text-center w-1/3">
                <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1 font-bold">Silber / g</p>
                <p id="marketSilver" class="text-[11px] font-mono text-white">Lade...</p>
            </div>
            <div class="w-[1px] h-6 bg-[#333]"></div>
            <div class="text-center w-1/3">
                <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1 font-bold">MSCI World</p>
                <p id="marketETF" class="text-[11px] font-mono text-white">Lade...</p>
            </div>
        </div>

        <div class="flex-1"></div>

        <div class="space-y-3 shrink-0">
            <button onclick="openModal()" class="w-full h-12 bg-white text-black rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition-colors">
                Neuer Eintrag
            </button>
            <button onclick="switchView('history')" class="w-full h-12 bg-transparent border border-[#333] text-gray-400 rounded-lg text-xs font-bold uppercase tracking-widest hover:border-white hover:text-white transition-colors">
                Historie Ansehen
            </button>
        </div>
        
        <div class="mt-4 text-center pb-safe">
             <span id="lastUpdateLabel" class="text-[9px] text-gray-700 font-mono">Stand: --:--</span>
        </div>
    </div>

    <div id="viewHistory" class="view-section px-5 pt-12 pb-8 bg-black">
        <div class="flex items-center justify-between mb-6 shrink-0">
            <span class="text-sm font-bold uppercase tracking-widest text-gray-500">Alle Käufe</span>
            <button onclick="switchView('dashboard')" class="text-white hover:text-gray-400">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>
        <div class="flex-1 overflow-hidden flex flex-col">
            <div id="historyList" class="overflow-y-auto no-scrollbar pb-10 space-y-4"></div>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-6">
        <div class="bg-[#111] border border-[#333] w-full max-w-xs rounded-xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-white font-medium text-sm uppercase tracking-widest">Einstellungen</h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-white"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div class="space-y-3">
                <div class="text-[10px] text-gray-600 uppercase font-bold mb-2">Datenverwaltung</div>
                <button onclick="exportBackup()" class="w-full py-3 bg-[#1c1c1e] border border-[#333] rounded text-xs text-gray-300 flex items-center justify-center gap-2 hover:bg-[#252525]">
                    <i class="ph ph-download-simple"></i> Backup Speichern
                </button>
                <button onclick="document.getElementById('importFile').click()" class="w-full py-3 bg-[#1c1c1e] border border-[#333] rounded text-xs text-gray-300 flex items-center justify-center gap-2 hover:bg-[#252525]">
                    <i class="ph ph-upload-simple"></i> Backup Laden
                </button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(this)">
            </div>
        </div>
    </div>

    <div id="entryModal" class="fixed inset-0 modal-overlay z-50 hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-[#111] border border-[#333] w-full max-w-sm rounded-xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modalTitle" class="text-white font-medium text-sm uppercase tracking-widest">Eintrag</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white"><i class="ph ph-x text-lg"></i></button>
            </div>
            
            <div class="space-y-6">
                <div class="flex gap-4">
                    <div class="w-1/3">
                        <label class="text-[9px] text-gray-500 uppercase tracking-widest block mb-1">Typ</label>
                        <select id="inpCat" onchange="updateModalLabels()" class="w-full py-2 text-sm text-center">
                            <option value="gold">Gold</option>
                            <option value="silver">Silber</option>
                            <option value="etf">ETF</option>
                        </select>
                    </div>
                    <div class="w-2/3">
                        <label class="text-[9px] text-gray-500 uppercase tracking-widest block mb-1">Produkt</label>
                        <input type="text" id="inpProd" placeholder="Name" class="w-full py-2 text-sm">
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-[9px] text-gray-500 uppercase tracking-widest block mb-1">Preis (€)</label>
                        <input type="number" id="inpAmt" placeholder="0.00" step="0.01" inputmode="decimal" class="w-full py-2 text-lg font-medium">
                    </div>
                    <div class="w-1/2">
                        <label id="lblWeight" class="text-[9px] text-gray-500 uppercase tracking-widest block mb-1">Gewicht (g)</label>
                        <input type="number" id="inpWgt" placeholder="0.00" step="0.01" inputmode="decimal" class="w-full py-2 text-lg font-medium">
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-[9px] text-gray-500 uppercase tracking-widest block mb-1">Ort</label>
                        <input type="text" id="inpLoc" placeholder="Händler" class="w-full py-2 text-sm">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[9px] text-gray-500 uppercase tracking-widest block mb-1">Datum</label>
                        <input type="date" id="inpDate" class="w-full py-2 text-xs text-center">
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button id="btnDelete" onclick="deleteCurrentEntry()" class="hidden w-1/3 h-10 border border-red-900 text-red-700 hover:bg-red-900/20 text-xs font-bold uppercase tracking-widest rounded">Löschen</button>
                <button onclick="saveEntry()" class="flex-1 h-10 bg-white text-black hover:bg-gray-200 text-xs font-bold uppercase tracking-widest rounded">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG & STATE
        let entries = JSON.parse(localStorage.getItem('portfolio_entries_v12')) || [];
        let prices = JSON.parse(localStorage.getItem('portfolio_prices_v12')) || { gold: 0, silver: 0, etf: 0, lastUpdate: 'Nie' };
        let isPrivacyMode = true; // STARTET VERSTECKT
        let currentEditId = null;

        // UI ELEMENTS
        const els = {
            totalVal: document.getElementById('currentValueDisplay'),
            plDisplay: document.getElementById('plDisplay'),
            plPercent: document.getElementById('plPercent'),
            sinceDate: document.getElementById('sinceDateLabel'),
            list: document.getElementById('historyList'),
            goldVal: document.getElementById('goldVal'), goldPL: document.getElementById('goldPL'),
            silverVal: document.getElementById('silverVal'), silverPL: document.getElementById('silverPL'),
            etfVal: document.getElementById('etfVal'), etfPL: document.getElementById('etfPL'),
            lastUpdate: document.getElementById('lastUpdateLabel'),
            iconPrivacy: document.getElementById('iconPrivacy'),
            mGold: document.getElementById('marketGold'),
            mSilver: document.getElementById('marketSilver'),
            mETF: document.getElementById('marketETF'),
            modal: document.getElementById('entryModal'),
            settingsModal: document.getElementById('settingsModal'),
            inpCat: document.getElementById('inpCat'), inpProd: document.getElementById('inpProd'),
            inpAmt: document.getElementById('inpAmt'), inpWgt: document.getElementById('inpWgt'),
            inpLoc: document.getElementById('inpLoc'), inpDate: document.getElementById('inpDate'),
            btnDelete: document.getElementById('btnDelete'), lblWeight: document.getElementById('lblWeight')
        };

        // INIT
        render();
        document.addEventListener("DOMContentLoaded", fetchAllPrices);
        document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'visible') fetchAllPrices(); });

        // VIEW & PRIVACY LOGIC
        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            if(viewName === 'history') {
                document.getElementById('viewHistory').classList.add('active');
                renderList();
            } else {
                document.getElementById('viewDashboard').classList.add('active');
                render();
            }
        }
        
        function togglePrivacy() {
            isPrivacyMode = !isPrivacyMode;
            els.iconPrivacy.className = isPrivacyMode ? "ph ph-eye-slash text-2xl" : "ph ph-eye text-2xl";
            render(); 
        }

        function openSettings() { els.settingsModal.classList.remove('hidden'); els.settingsModal.classList.add('flex'); }
        function closeSettings() { els.settingsModal.classList.add('hidden'); els.settingsModal.classList.remove('flex'); }

        // FETCH-FUNKTION
        async function fetchAllPrices() {
            const icon = document.getElementById('iconRefresh');
            if(icon) icon.classList.add('ph-spinner', 'spin-slow');
            els.lastUpdate.innerText = "Kurse werden aktualisiert...";
            
            els.mGold.innerText = "Lade...";
            els.mSilver.innerText = "Lade...";
            els.mETF.innerText = "Lade...";

            // 1. GOLD & SILBER - Ohne Yahoo (Direkt API)
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json');
                const data = await res.json();
                
                if (data && data.eur && data.eur.xau && data.eur.xag) {
                    const pricePerOzGold = 1 / data.eur.xau;
                    const pricePerOzSilver = 1 / data.eur.xag;
                    
                    prices.gold = pricePerOzGold / 31.1034768;   // Umrechnung in Gramm
                    prices.silver = pricePerOzSilver / 31.1034768; // Umrechnung in Gramm
                    
                    els.mGold.innerText = prices.gold.toFixed(2) + " €";
                    els.mSilver.innerText = prices.silver.toFixed(2) + " €";
                } else {
                    throw new Error("Daten fehlen");
                }
            } catch (e) {
                console.error("Fehler Gold/Silber:", e);
                els.mGold.innerText = "Fehler";
                els.mSilver.innerText = "Fehler";
            }

            // 2. ETF (Core MSCI World) - Originale Methode via AllOrigins/GET (die immer funktioniert hat)
            try {
                const url = 'https://query1.finance.yahoo.com/v8/finance/chart/EUNL.DE?interval=1d&range=1d';
                // Wichtig: Wir nutzen wieder /get anstatt /raw, exakt wie in deiner ersten Datei
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&ts=${Date.now()}`;
                
                const res = await fetch(proxyUrl);
                const data = await res.json();
                
                if (data && data.contents) {
                    const json = JSON.parse(data.contents);
                    if (json.chart && json.chart.result && json.chart.result[0]) {
                        prices.etf = json.chart.result[0].meta.regularMarketPrice;
                        els.mETF.innerText = prices.etf.toFixed(2) + " €";
                    } else {
                        throw new Error("Preis in JSON nicht gefunden");
                    }
                } else {
                    throw new Error("Leere Antwort von AllOrigins");
                }
            } catch (e) {
                console.error("Fehler ETF:", e);
                els.mETF.innerText = "Fehler";
            }

            // Status speichern
            prices.lastUpdate = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
            localStorage.setItem('portfolio_prices_v12', JSON.stringify(prices));
            els.lastUpdate.innerText = "Letztes Update: " + prices.lastUpdate;
            
            render();
            if(icon) icon.classList.remove('ph-spinner', 'spin-slow');
        }

        // RENDER LOGIK
        function render() {
            let tInv=0, tVal=0, gInv=0, gVal=0, sInv=0, sVal=0, eInv=0, eVal=0;

            if(entries.length === 0) els.sinceDate.innerText = "Keine Daten";
            else {
                const sorted = [...entries].sort((a,b) => new Date(a.date) - new Date(b.date));
                els.sinceDate.innerText = "Seit " + new Date(sorted[0].date).toLocaleDateString('de-DE');
            }

            // Fallback Anzeige, falls fetch nicht lief
            if(prices.gold > 0 && els.mGold.innerText === "Lade...") els.mGold.innerText = prices.gold.toFixed(2) + " €";
            if(prices.silver > 0 && els.mSilver.innerText === "Lade...") els.mSilver.innerText = prices.silver.toFixed(2) + " €";
            if(prices.etf > 0 && els.mETF.innerText === "Lade...") els.mETF.innerText = prices.etf.toFixed(2) + " €";
            els.lastUpdate.innerText = "Stand: " + prices.lastUpdate;

            entries.forEach(e => {
                tInv += e.amount;
                let p = 0;
                if(e.category === 'gold') p = prices.gold;
                else if(e.category === 'silver') p = prices.silver;
                else p = prices.etf;
                
                let val = (p > 0) ? e.weight * p : e.amount;
                
                if(e.category === 'gold') { gVal += val; gInv += e.amount; }
                else if(e.category === 'silver') { sVal += val; sInv += e.amount; }
                else if(e.category === 'etf') { eVal += val; eInv += e.amount; }
                tVal += val;
            });

            els.totalVal.innerText = fmt(tVal);
            const totalPL = tVal - tInv;
            const totalPLP = tInv > 0 ? (totalPL/tInv)*100 : 0;
            
            els.plDisplay.innerText = (totalPL >= 0 ? "+" : "") + fmt(totalPL);
            els.plPercent.innerText = (totalPL >= 0 ? "+" : "") + totalPLP.toFixed(2) + "%";
            
            const col = totalPL >= 0 ? "text-green-500" : "text-red-500";
            els.plDisplay.className = "text-xs " + col;
            els.plPercent.className = "text-xs font-bold " + col;

            updateCard(els.goldVal, els.goldPL, gVal, gInv);
            updateCard(els.silverVal, els.silverPL, sVal, sInv);
            updateCard(els.etfVal, els.etfPL, eVal, eInv);
        }

        function renderList() {
            els.list.innerHTML = '';
            if(entries.length === 0) {
                els.list.innerHTML = '<div class="text-center text-gray-700 text-xs mt-10">Keine Daten</div>';
                return;
            }

            entries.forEach(e => {
                let p = 0;
                if(e.category === 'gold') p = prices.gold;
                else if(e.category === 'silver') p = prices.silver;
                else p = prices.etf;

                const val = (p > 0) ? e.weight * p : e.amount;
                const pl = val - e.amount;
                const plP = e.amount > 0 ? (pl/e.amount)*100 : 0;
                const col = pl >= 0 ? 'text-green-500' : 'text-red-500';
                
                const dateStr = new Date(e.date).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'2-digit'});
                let catLabel = e.category === 'etf' ? 'ETF' : (e.category === 'gold' ? 'Gold' : 'Silber');

                const el = document.createElement('div');
                el.onclick = () => openModal(e.id);
                el.className = 'border-b border-[#222] pb-3 last:border-0 cursor-pointer';
                el.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-white text-sm font-medium">${e.product}</span>
                        <span class="text-white text-sm font-light">${fmt(val)}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-[10px] text-gray-500 flex gap-2">
                            <span class="uppercase tracking-wider">${catLabel}</span>
                            <span>•</span>
                            <span>${dateStr}</span>
                            ${e.location ? `<span>• ${e.location}</span>` : ''}
                        </div>
                        <div class="flex gap-2 text-[10px]">
                            <span class="text-gray-600">${isPrivacyMode ? '•••• €' : fmt0(e.amount)}</span>
                            <span class="${col}">${pl >= 0 ? '+' : ''}${plP.toFixed(1)}%</span>
                        </div>
                    </div>
                `;
                els.list.appendChild(el);
            });
        }

        function updateCard(elVal, elPL, curr, inv) {
            const diff = curr - inv;
            const pct = inv > 0 ? (diff/inv)*100 : 0;
            elVal.innerText = fmt(curr);
            elPL.innerText = (diff >= 0 ? "+" : "") + pct.toFixed(1) + "%";
            elPL.className = diff >= 0 ? "text-[9px] text-green-500" : "text-[9px] text-red-500";
        }

        // DATENVERWALTUNG & MODALS
        function openModal(id = null) {
            currentEditId = id;
            els.modal.classList.remove('hidden'); els.modal.classList.add('flex');
            if(id) {
                const e = entries.find(x => x.id === id);
                document.getElementById('modalTitle').innerText = "Bearbeiten";
                els.btnDelete.classList.remove('hidden');
                els.inpCat.value = e.category; els.inpProd.value = e.product;
                els.inpAmt.value = e.amount; els.inpWgt.value = e.weight;
                els.inpLoc.value = e.location || ''; els.inpDate.value = e.date;
            } else {
                document.getElementById('modalTitle').innerText = "Neuer Eintrag";
                els.btnDelete.classList.add('hidden');
                els.inpCat.value = 'gold'; els.inpProd.value = '';
                els.inpAmt.value = ''; els.inpWgt.value = '';
                els.inpLoc.value = ''; els.inpDate.value = new Date().toISOString().split('T')[0];
            }
            updateModalLabels();
        }
        function closeModal() { els.modal.classList.add('hidden'); els.modal.classList.remove('flex'); currentEditId = null; }
        
        function updateModalLabels() {
            if(els.inpCat.value === 'etf') { 
                els.lblWeight.innerText = "Anzahl (Stk)"; 
                els.inpWgt.placeholder="2.5";
                if(els.inpProd.value === '') els.inpProd.value = "Core MSCI World USD (Acc)";
            } else { 
                els.lblWeight.innerText = "Gewicht (g)"; 
                els.inpWgt.placeholder="31.1"; 
                if(els.inpProd.value === "Core MSCI World USD (Acc)") els.inpProd.value = "";
            }
        }
        
        function saveEntry() {
            const amt = parseFloat(els.inpAmt.value);
            const wgt = parseFloat(els.inpWgt.value);
            if(!amt || amt <= 0) { alert("Preis fehlt!"); return; }
            
            const cat = els.inpCat.value;
            let prod = els.inpProd.value.trim();
            if(!prod) prod = cat === 'etf' ? "Core MSCI World USD (Acc)" : (cat==='gold'?"Gold":"Silber");

            const item = {
                id: currentEditId || Date.now(),
                amount: amt, weight: wgt || 0, category: cat,
                product: prod, location: els.inpLoc.value.trim(), date: els.inpDate.value
            };

            if(currentEditId) {
                const idx = entries.findIndex(x => x.id === currentEditId);
                entries[idx] = item;
            } else {
                entries.unshift(item);
            }
            entries.sort((a,b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('portfolio_entries_v12', JSON.stringify(entries));
            
            if(document.getElementById('viewHistory').classList.contains('active')) renderList();
            render(); closeModal();
        }
        
        function deleteCurrentEntry() {
            if(confirm("Löschen?")) {
                entries = entries.filter(x => x.id !== currentEditId);
                localStorage.setItem('portfolio_entries_v12', JSON.stringify(entries));
                if(document.getElementById('viewHistory').classList.contains('active')) renderList();
                render(); closeModal();
            }
        }
        
        function exportBackup() {
            const d = {entries, prices, version:'v12'};
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(d));
            a.download = "portfolio_backup.json"; a.click();
        }
        
        function importBackup(inp) {
            const f = inp.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = e => {
                try {
                    const d = JSON.parse(e.target.result);
                    if(confirm("Daten überschreiben?")) {
                        // AKZEPTIERT BEIDE BACKUP ARTEN!
                        if(Array.isArray(d)) {
                            entries = d;
                            localStorage.setItem('portfolio_entries_v12', JSON.stringify(entries));
                        } else {
                            if(d.entries) { entries = d.entries; localStorage.setItem('portfolio_entries_v12', JSON.stringify(entries)); }
                            if(d.prices) { prices = d.prices; localStorage.setItem('portfolio_prices_v12', JSON.stringify(prices)); }
                        }
                        location.reload();
                    }
                } catch(err) { alert("Backup Fehler"); }
            };
            r.readAsText(f);
            closeSettings();
        }
        
        function fmt(n) { return isPrivacyMode ? '•••• €' : new Intl.NumberFormat('de-DE', {style:'currency', currency:'EUR'}).format(n); }
        function fmt0(n) { return new Intl.NumberFormat('de-DE', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(n); }
    </script>
</body>
</html>
